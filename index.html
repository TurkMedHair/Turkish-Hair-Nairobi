    <style>
        /* ================================================
           1. MASTER DESIGN SYSTEM (CLEAN LUXURY WHITE INTERFACE)
           ================================================
        */
        :root {
            --primary-navy: #040d21;      /* Luxury Deep Navy Blue */
            --bg-clean-white: #ffffff;    /* Primary Luxury Interface Base */
            --silver-gray: #f8fafc;       /* Clean Light Gray Section Backgrounds */
            --accent-gold: #c5a059;       /* Turkish Premium Gold Accent */
            --text-dark: #0f172a;         /* Deep Rich Text for Maximum Readability */
            --text-muted: #475569;        /* Medium Subtext Layer */
            --border-subtle: #e2e8f0;     /* Soft Division Contours */
            --transition-hq: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-clean-white); 
            color: var(--text-dark); 
            line-height: 1.75; 
            overflow-x: hidden; 
        }

        /* UTILITY LAYOUT CONFIGURATIONS */
        .section-padding { padding: 120px 5%; max-width: 1400px; margin: 0 auto; }
        .bg-silver { background: var(--silver-gray); border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); }
        .reveal { opacity: 0; transform: translateY(25px); transition: var(--transition-hq); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ================================================
           2. NAVIGATION FRAMEWORK (SINGLE LINE STRUCTURAL LAYOUT)
           ================================================
        */
        .header-main {
            position: fixed; top: 0; width: 100%; z-index: 9999;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle); padding: 15px 0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
        }
        .nav-container { 
            max-width: 1400px; margin: 0 auto; padding: 0 5%; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo-text { 
            font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; 
            color: var(--primary-navy); letter-spacing: 1.5px; text-decoration: none;
        }
        .logo-text span { color: var(--accent-gold); }
        
        .nav-menu { display: flex; list-style: none; gap: 24px; align-items: center; }
        .nav-menu li { white-space: nowrap; }
        .nav-menu a { 
            text-decoration: none; color: var(--text-dark); font-family: 'Montserrat', sans-serif;
            font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition-hq);
        }
        .nav-menu a:hover { color: var(--accent-gold); }
        .nav-cta { 
            background: var(--accent-gold) !important; color: #fff !important; 
            padding: 11px 22px !important; border-radius: 4px; font-size: 11px !important; box-shadow: 0 4px 15px rgba(197,160,89,0.2);
        }
        .nav-cta:hover { background: var(--primary-navy) !important; color: #fff !important; }

        /* ================================================
           3. PREMIUM HERO FRAMEWORK & VIDEO OVERLAYS
           ================================================
        */
        .hero-premium {
            min-height: 95vh; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 5% 60px;
            background: var(--primary-navy);
        }
        .hero-video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.22;
        }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, var(--primary-navy)), radial-gradient(circle, transparent, var(--primary-navy)); z-index: 2; }
        .hero-content { position: relative; z-index: 3; max-width: 900px; }
        .hero-content .subtitle { 
            color: var(--accent-gold); font-family: 'Montserrat', sans-serif; font-weight: 700;
            letter-spacing: 6px; font-size: 14px; margin-bottom: 25px; display: block; text-transform: uppercase;
        }
        .hero-content h1 { 
            font-family: 'Playfair Display', serif; font-size: clamp(32px, 6vw, 68px); 
            line-height: 1.15; margin-bottom: 25px; font-weight: 700; color: #fff;
        }
        .hero-content p { color: #cbd5e1; font-size: 17px; max-width: 720px; margin: 0 auto 40px; }
        
        .hero-actions { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .btn-gold { background: var(--accent-gold); color: #fff; padding: 16px 36px; text-decoration: none; font-weight: 700; font-family: 'Montserrat', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; border: none; cursor: pointer; transition: var(--transition-hq); }
        .btn-gold:hover { background: #fff; color: var(--primary-navy); transform: translateY(-2px); }
        .btn-white-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.2); padding: 14px 34px; text-decoration: none; font-weight: 700; font-family: 'Montserrat', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; transition: var(--transition-hq); }
        .btn-white-outline:hover { background: rgba(255,255,255,0.08); border-color: #fff; }

        /* TRUST BADGE MATRIX SECTION */
        .trust-badge-row {
            display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: -50px; position: relative; z-index: 10; padding: 0 5%; max-width: 1400px; margin-left: auto; margin-right: auto;
        }
        .trust-badge-card {
            background: var(--bg-clean-white); border: 1px solid var(--border-subtle); padding: 30px 35px; display: flex; align-items: center; gap: 20px; width: 360px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border-radius: 6px;
        }
        .trust-badge-card i { color: var(--accent-gold); font-size: 32px; }
        .trust-badge-card h6 { font-family: 'Montserrat', sans-serif; font-size: 15px; color: var(--primary-navy); font-weight: 700; }
        .trust-badge-card p { font-size: 13px; color: var(--text-muted); }

        /* ================================================
           4. CLINICAL SERVICES GRID (HIGH CONTENT DENSITY)
           ================================================
        */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 40px; }
        .service-block {
            background: var(--bg-clean-white); border: 1px solid var(--border-subtle);
            padding: 50px 40px; border-radius: 6px; position: relative; overflow: hidden;
            transition: var(--transition-hq); box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }
        .service-block:hover { 
            border-color: var(--accent-gold); transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(4,13,33,0.05);
        }
        .service-block i { font-size: 44px; color: var(--accent-gold); margin-bottom: 25px; display: block; }
        .service-block h3 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 15px; color: var(--primary-navy); }
        .service-block p { color: var(--text-muted); font-size: 14.5px; margin-bottom: 20px; }
        .service-block ul { list-style: none; color: var(--text-dark); font-size: 13.5px; font-weight: 500; border-top: 1px solid var(--border-subtle); padding-top: 20px; }
        .service-block ul li { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .service-block ul li::before { content: '✓'; color: var(--accent-gold); font-weight: 700; }

        /* ================================================
           5. INTERACTIVE BEFORE/AFTER RESTORATION GALLERY
           ================================================
        */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 40px; margin-top: 50px; }
        .gallery-card { background: var(--bg-clean-white); border: 1px solid var(--border-subtle); border-radius: 6px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .split-slider-container { display: flex; width: 100%; position: relative; background: #000; height: 300px; }
        .split-side { width: 50%; position: relative; height: 100%; overflow: hidden; }
        .split-side img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .split-label { position: absolute; top: 15px; background: rgba(4,13,33,0.85); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; padding: 4px 10px; letter-spacing: 1px; text-transform: uppercase; border-radius: 2px; }
        .label-before { right: 15px; border-right: 3px solid var(--accent-gold); }
        .label-after { left: 15px; border-left: 3px solid var(--accent-gold); }
        .gallery-details { padding: 30px; border-top: 1px solid var(--border-subtle); }
        .gallery-details h5 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--primary-navy); margin-bottom: 8px; }
        .gallery-details p { font-size: 13.5px; color: var(--text-muted); line-height: 1.6; }

        /* ================================================
           6. ESTIMATOR ENGINE (PRICING & SESSION LOGIC)
           ================================================
        */
        .estimator-box { max-width: 850px; margin: 0 auto; background: var(--bg-clean-white); border: 1px solid var(--border-subtle); padding: 50px; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); text-align: left; }
        .estimator-range { width: 100%; margin: 35px 0; -webkit-appearance: none; background: #f1f5f9; height: 8px; border-radius: 4px; outline: none; }
        .estimator-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; background: var(--accent-gold); cursor: pointer; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.1s ease; }
        .estimator-range::-webkit-slider-thumb:hover { transform: scale(1.15); }
        .estimator-output { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; border-top: 1px solid var(--border-subtle); padding-top: 35px; margin-top: 20px; }
        .output-block span { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); display: block; margin-bottom: 5px; font-weight: 600; }
        .output-block b { font-size: 24px; color: var(--primary-navy); font-family: 'Montserrat', sans-serif; font-weight: 700; }

        /* ================================================
           7. SURGEON PORTFOLIO FRAMEWORK
           ================================================
        */
        .doctor-showcase { background: var(--silver-gray); border-top: 1px solid var(--border-subtle); padding: 120px 5%; }
        .doc-card { display: flex; background: var(--bg-clean-white); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; max-width: 1100px; margin: 0 auto; box-shadow: 0 15px 40px rgba(0,0,0,0.02); }
        .doc-img { width: 45%; min-height: 500px; }
        .doc-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .doc-info { width: 55%; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .doc-info h4 { color: var(--accent-gold); font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; font-size: 13px; font-weight: 700; }
        .doc-info h2 { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 20px; color: var(--primary-navy); }
        .doc-info p { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; }
        .doc-qualifications { display: flex; gap: 12px; flex-wrap: wrap; }
        .q-badge { background: var(--silver-gray); padding: 8px 16px; border-radius: 4px; font-size: 11px; font-weight: 700; font-family: 'Montserrat', sans-serif; border: 1px solid var(--border-subtle); color: var(--primary-navy); letter-spacing: 0.5px; }

        /* ================================================
           8. CORE BLOG SYSTEM SECTION (SEO TEXT INJECTIONS)
           ================================================
        */
        .blog-container { max-width: 1200px; margin: 50px auto 0; }
        .blog-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 40px; }
        .blog-tabs::-webkit-scrollbar { height: 4px; }
        .blog-tabs::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
